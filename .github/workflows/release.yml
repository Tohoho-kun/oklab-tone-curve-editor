name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
        include:
          - os: macos-latest
            artifact_name: OkhslToneCurve_mac.zip
          - os: windows-latest
            artifact_name: OkhslToneCurve_win.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller tifffile numpy fastapi uvicorn pydantic starlette pillow

      - name: Build with PyInstaller (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          pyinstaller --noconsole --onefile \
            --name "OkhslToneCurve" \
            --add-data "frontend:frontend" \
            --paths "backend" \
            --exclude-module scipy \
            --exclude-module matplotlib \
            --exclude-module pandas \
            backend/launcher.py
          cd dist
          zip -r ../OkhslToneCurve_mac.zip OkhslToneCurve.app

      - name: Build with PyInstaller (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --noconsole --onefile `
            --name "OkhslToneCurve" `
            --add-data "frontend;frontend" `
            --paths "backend" `
            --exclude-module scipy `
            --exclude-module matplotlib `
            --exclude-module pandas `
            backend/launcher.py
          if (Test-Path dist/OkhslToneCurve.exe) {
            Move-Item dist/OkhslToneCurve.exe ./OkhslToneCurve_win.exe
          } else {
            echo "Error: OkhslToneCurve.exe not found in dist/"
            exit 1
          }

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            OkhslToneCurve_mac.zip
            OkhslToneCurve_win.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
