name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
        include:
          - os: macos-latest
            artifact_name: OkhslToneCurve_mac.zip
          - os: windows-latest
            artifact_name: OkhslToneCurve_win.zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller tifffile numpy fastapi uvicorn pydantic starlette pillow

      - name: Build with PyInstaller (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          # Mac: Standard --onedir build for better compatibility
          pyinstaller --noconsole --onedir \
            --name "OkhslToneCurve" \
            --add-data "frontend:frontend" \
            --paths "backend" \
            --hidden-import numpy \
            --hidden-import tifffile \
            --collect-all multipart \
            --exclude-module scipy \
            --exclude-module matplotlib \
            --exclude-module pandas \
            backend/launcher.py
          cd dist
          zip -r ../OkhslToneCurve_mac.zip OkhslToneCurve.app

      - name: Build with PyInstaller (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          # Windows: --onefile is usually fine, but let's use --onedir for debugging and reliability
          pyinstaller --noconsole --onedir `
            --name "OkhslToneCurve" `
            --add-data "frontend;frontend" `
            --paths "backend" `
            --hidden-import numpy `
            --hidden-import tifffile `
            --collect-all multipart `
            --exclude-module scipy `
            --exclude-module matplotlib `
            --exclude-module pandas `
            backend/launcher.py
          cd dist
          Compress-Archive -Path OkhslToneCurve -DestinationPath ../OkhslToneCurve_win.zip

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            OkhslToneCurve_mac.zip
            OkhslToneCurve_win.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
